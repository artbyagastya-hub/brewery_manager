{% extends "base.html" %}
{% block title %}User Permissions - Brewery Manager{% endblock %}
{% block content %}
<h2>Permissions for {{ user.full_name or user.username }}</h2>
<form method="POST">
<div class="card"><div class="card-body">
{% for perm in all_permissions %}
<div class="form-check">
    <input class="form-check-input" type="checkbox" name="perm_{{ perm.id }}" value="1" {{ 'checked' if perm.id in current_perms else '' }}>
    <label class="form-check-label">{{ perm.name }} <small class="text-muted">({{ perm.module }})</small></label>
</div>
{% endfor %}
</div></div>
<button type="submit" class="btn btn-primary mt-3">Save Permissions</button>
</form>
{% endblock %}
