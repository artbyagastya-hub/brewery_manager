{% extends "base.html" %}

{% block title %}Add Transaction - Brewery Manager{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-plus me-2"></i>Add Transaction</h2>
    <a href="/finance" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-1"></i>Back</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Transaction Type *</label>
                    <select name="transaction_type" class="form-select" required>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Category</label>
                    <input type="text" name="category" class="form-control"
                        placeholder="e.g., Sales, Raw Materials, Utilities">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Amount (VND) *</label>
                    <input type="number" step="0.01" name="amount" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Transaction Date *</label>
                    <input type="date" name="transaction_date" class="form-control" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Save Transaction</button>
        </form>
    </div>
</div>
{% endblock %}
