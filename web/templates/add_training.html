{% extends "base.html" %}
{% block title %}Add Training Record - Brewery Manager{% endblock %}
{% block content %}
<h2>Add Training Record</h2>
<form method="POST" class="card p-4">
    <div class="mb-3"><label class="form-label">Staff</label><select name="staff_id" class="form-select" required>{% for s in staff %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}</select></div>
    <div class="mb-3"><label class="form-label">Date</label><input type="date" name="training_date" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">Topic</label><input type="text" name="topic" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">Trainer</label><input type="text" name="trainer" class="form-control"></div>
    <div class="mb-3"><label class="form-label">Duration (hours)</label><input type="number" step="0.5" name="duration_hours" class="form-control"></div>
    <div class="mb-3"><label class="form-label">Result</label><select name="result" class="form-select"><option value="pass">Pass</option><option value="fail">Fail</option></select></div>
    <button type="submit" class="btn btn-primary">Save</button>
</form>
{% endblock %}
