{% extends "base.html" %}

{% block title %}{{ t('add_recipe', default='Add Recipe') }} - Brewery Manager{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3">🍺 {{ t('add_recipe', default='Add Recipe') }}</h1>
        <a href="{{ url_for('recipes') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> {{ t('back', default='Back') }}
        </a>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <form method="POST">
                <input type="hidden" name="csrf_token" value="<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">">

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">{{ t('name', default='Name') }} *</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">{{ t('style', default='Style') }}</label>
                            <input type="text" name="style" class="form-control"
                                placeholder="e.g., IPA, Stout, Pilsner">
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label">{{ t('batch_size', default='Batch Size') }} *</label>
                            <div class="input-group">
                                <input type="number" name="batch_size" class="form-control" value="20" step="0.1"
                                    required>
                                <select name="batch_size_unit" class="form-select">
                                    <option value="L">L</option>
                                    <option value="gal">gal</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label">{{ t('boil_time', default='Boil Time (min)') }}</label>
                            <input type="number" name="boil_time" class="form-control" value="60">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label">{{ t('efficiency', default='Efficiency (%)') }}</label>
                            <input type="number" name="efficiency" class="form-control" value="75" step="0.1">
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label class="form-label">{{ t('og', default='OG') }}</label>
                            <input type="number" name="og" class="form-control" step="0.001" placeholder="1.050">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label class="form-label">{{ t('fg', default='FG') }}</label>
                            <input type="number" name="fg" class="form-control" step="0.001" placeholder="1.012">
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="mb-3">
                            <label class="form-label">{{ t('abv', default='ABV (%)') }}</label>
                            <input type="number" name="abv" class="form-control" step="0.1" placeholder="5.0">
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="mb-3">
                            <label class="form-label">{{ t('ibu', default='IBU') }}</label>
                            <input type="number" name="ibu" class="form-control" step="0.1" placeholder="35">
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="mb-3">
                            <label class="form-label">{{ t('srm', default='SRM') }}</label>
                            <input type="number" name="srm" class="form-control" step="0.1" placeholder="10">
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">{{ t('product', default='Link to Product') }}</label>
                    <select name="product_id" class="form-select">
                        <option value="">-- {{ t('none', default='None') }} --</option>
                        {% for product in products %}
                        <option value="{{ product.id }}">{{ product.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">{{ t('description', default='Description') }}</label>
                    <textarea name="description" class="form-control" rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">{{ t('notes', default='Notes') }}</label>
                    <textarea name="notes" class="form-control" rows="2"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> {{ t('save', default='Save') }}
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
