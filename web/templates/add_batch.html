{% extends "base.html" %}

{% block title %}Add Batch - Brewery Manager{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-plus me-2"></i>New Production Batch</h2>
    <a href="/production" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-1"></i>Back</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Batch Number *</label>
                    <input type="text" name="batch_number" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Product *</label>
                    <select name="product_id" class="form-select" required>
                        <option value="">Select Product</option>
                        {% for p in products %}
                        <option value="{{ p.id }}">{{ p.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Fermenter Tank *</label>
                    <select name="tank_id" class="form-select" required>
                        <option value="">Select Fermenter Tank</option>
                        {% for tank in tanks %}
                        <option value="{{ tank.id }}">{{ tank.name }} ({{ tank.capacity }}{{ tank.capacity_unit }} - {{
                            tank.status }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Status *</label>
                    <select name="status" class="form-select" required>
                        <option value="planned">Planned</option>
                        <option value="brewing">Brewing</option>
                        <option value="fermenting">Fermenting</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Start Date *</label>
                    <input type="date" name="start_date" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">End Date</label>
                    <input type="date" name="end_date" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Recipe</label>
                    <select name="recipe_id" class="form-select">
                        <option value="">Select Recipe (Optional)</option>
                        {% for recipe in recipes %}
                        <option value="{{ recipe.id }}">{{ recipe.name }} ({{ recipe.style }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Volume (Liters) *</label>
                    <input type="number" step="0.01" name="volume_liters" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Actual ABV (%)</label>
                    <input type="number" step="0.1" name="actual_abv" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Actual IBU</label>
                    <input type="number" name="actual_ibu" class="form-control">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Notes</label>
                <textarea name="notes" class="form-control" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Save Batch</button>
        </form>
    </div>
</div>
{% endblock %}
