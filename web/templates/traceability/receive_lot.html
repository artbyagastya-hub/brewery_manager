{% extends "base.html" %}

{% block title %}{{ t('traceability.receive_lot', 'Receive Lot') }} - Brewery Manager{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-truck-loading me-2"></i>{{ t('traceability.receive_lot', 'Receive Material Lot') }}</h2>
        <a href="{{ url_for('traceability_lots') }}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i>{{ t('common.back', 'Back to Lots') }}
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="material_id" class="form-label">{{ t('traceability.material', 'Material') }}
                            *</label>
                        <select class="form-select" id="material_id" name="material_id" required>
                            <option value="">{{ t('common.select', 'Select Material') }}</option>
                            {% for material in materials %}
                            <option value="{{ material.id }}" data-unit="{{ material.unit }}">
                                {{ material.name }} ({{ material.category }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="supplier" class="form-label">{{ t('traceability.supplier', 'Supplier') }}</label>
                        <input type="text" class="form-control" id="supplier" name="supplier">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="quantity_received" class="form-label">{{ t('traceability.quantity', 'Quantity') }}
                            *</label>
                        <input type="number" step="0.01" class="form-control" id="quantity_received"
                            name="quantity_received" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="unit" class="form-label">{{ t('traceability.unit', 'Unit') }} *</label>
                        <input type="text" class="form-control" id="unit" name="unit" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="cost_per_unit" class="form-label">{{ t('traceability.cost_per_unit', 'Cost per
                            Unit') }}</label>
                        <input type="number" step="0.01" class="form-control" id="cost_per_unit" name="cost_per_unit">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="received_date" class="form-label">{{ t('traceability.received_date', 'Received
                            Date') }} *</label>
                        <input type="date" class="form-control" id="received_date" name="received_date"
                            value="{{ today }}" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="expiry_date" class="form-label">{{ t('traceability.expiry_date', 'Expiry Date')
                            }}</label>
                        <input type="date" class="form-control" id="expiry_date" name="expiry_date">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="storage_location" class="form-label">{{ t('traceability.storage_location', 'Storage
                            Location') }}</label>
                        <input type="text" class="form-control" id="storage_location" name="storage_location">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="certificate_of_analysis" class="form-label">{{ t('traceability.coa', 'Certificate of
                            Analysis') }}</label>
                        <input type="text" class="form-control" id="certificate_of_analysis"
                            name="certificate_of_analysis">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="notes" class="form-label">{{ t('common.notes', 'Notes') }}</label>
                    <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
                </div>

                <div class="d-flex justify-content-end">
                    <a href="{{ url_for('traceability_lots') }}" class="btn btn-secondary me-2">{{ t('common.cancel',
                        'Cancel') }}</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-1"></i>{{ t('traceability.receive', 'Receive Lot') }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('material_id').addEventListener('change', function () {
        const selected = this.options[this.selectedIndex];
        const unit = selected.getAttribute('data-unit');
        if (unit) {
            document.getElementById('unit').value = unit;
        }
    });
</script>
{% endblock %}
