{% extends "base.html" %}
{% block title %}Add Team - Brewery Manager{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="h2 mb-1">➕ Add Team</h1>
    </div>
    <a href="{{ url_for('teams') }}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Team Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Team Lead</label>
                        <select name="lead_user_id" class="form-select">
                            <option value="">No Lead</option>
                            {% for u in users %}
                            <option value="{{ u.id }}">{{ u.full_name or u.username }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-flex justify-content-end gap-2 mt-3">
                        <a href="{{ url_for('teams') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Create Team</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
